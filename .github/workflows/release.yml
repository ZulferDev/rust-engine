name: "Build & Release"

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: "Build binary for ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4

      - name: "Install Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: "Install musl tools"
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: "Build"
        run: cargo build --release --target ${{ matrix.target }}

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: backtest_engine-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/backtest_engine

  release:
    name: "Create release"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: backtest_engine-*
          merge-multiple: true

      - name: "Rename and set executable"
        run: |
          for f in backtest_engine*; do
            if [ -f "$f" ]; then
              target_name="backtest_engine-x86_64-unknown-linux-musl"
              [ "$f" != "$target_name" ] && mv "$f" "$target_name"
              chmod +x "$target_name"
            fi
          done
          ls -la

      - name: "Release"
        uses: softprops/action-gh-release@v2
        with:
          files: backtest_engine-x86_64-unknown-linux-musl
          generate_release_notes: true
